name: Feature Request
description: Propose a new feature or enhancement
labels: ["feature"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: A short, imperative description (e.g. "Add user profile page")
      placeholder: "Add ..."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Who benefits, what they want, and why
      placeholder: "As a [role], I want [goal], so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the feature. Include context, motivation, and any design decisions.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria. Each item will become an E2E test case.
      placeholder: |
        - [ ] User can ...
        - [ ] When ... then ...
        - [ ] Error state shows ...
    validations:
      required: true

  - type: checkboxes
    id: affected_layers
    attributes:
      label: Affected Layers
      description: Which parts of the stack does this touch?
      options:
        - label: "Database (migration needed)"
        - label: "Backend (NestJS service/resolver)"
        - label: "Frontend (Angular component/page)"
        - label: "GraphQL schema (codegen required)"

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Other issues that must be completed first. Use task list syntax for machine-readable tracking.
      placeholder: |
        - [ ] #1 — reason
        - [ ] #2 — reason

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: Mockup / Design Notes
      description: Links to designs, PrimeNG components to use, or layout descriptions
